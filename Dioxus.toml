[application]

# App (Project) Name
name = "fasterx"

[bundle]
identifier = "angelovangel.github.com"
publisher = "Angel Angelov"
icon = ["assets/favicon.png"]

# Dioxus App Default Platform
# desktop, web
default_platform = "desktop"

# `build` & `serve` dist path
out_dir = "build"

# resource (assets) file folder
asset_dir = "assets"

[web.app]
title = "fasterx"
base_path = "faster-app"

[web.watcher]
reload_html = true
watch_path = ["src", "assets"]
